<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorksCalendar Embed Host</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        background: #e2e8f0;
        color: #0f172a;
      }
      .shell {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      .card header {
        padding: 16px 18px;
        border-bottom: 1px solid #e2e8f0;
      }
      .card h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }
      .card p {
        margin: 0;
        color: #475569;
        font-size: 14px;
      }
      iframe {
        display: block;
        width: 100%;
        height: 760px;
        border: 0;
        background: #fff;
      }
      .notes {
        padding: 12px 18px 18px;
        font-size: 13px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card" data-testid="embed-host-card">
        <header>
          <h1>WorksCalendar iframe embed demo</h1>
          <p>Host page rendering the calendar inside a constrained iframe container.</p>
        </header>
        <iframe
          data-testid="calendar-embed-iframe"
          title="WorksCalendar embed demo"
          src="./embed-frame.html"
        ></iframe>
        <div class="notes">
          This page simulates a third-party site embedding the calendar in an iframe.
        </div>
      </section>
    </main>
  </body>
</html>
