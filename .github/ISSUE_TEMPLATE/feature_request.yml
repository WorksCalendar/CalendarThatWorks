name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check the [Roadmap](../docs/Roadmap.md) — it may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point that prompted this request.
      placeholder: "e.g. I can't see which crew members are on shift for a given day without switching views."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough sketches, examples from other tools, or API ideas are all helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you're using today, or other ways this could be solved.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Calendar views (month / week / day / agenda)
        - Schedule / timeline view
        - Dispatch board
        - Request queue & approvals
        - Assets view
        - Map / location
        - Event editor / forms
        - Conflict engine
        - Resource pools
        - Filtering & saved views
        - Themes & customization
        - Config / setup wizard
        - Public API / types
        - Integrations (Supabase, REST, ICS)
        - Performance
        - Accessibility
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to your use case?
      options:
        - Nice to have
        - Would unblock a workflow
        - Blocker — can't ship without this
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, or anything else that helps.
