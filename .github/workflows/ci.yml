name: CI

# Pull request runs cover every feature branch with an open PR. Push
# is scoped to main so we still get a post-merge regression guard plus
# a deploy-artifact build, without doubling CI minutes on every push
# that's already going to fire pull_request right after.
on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    # Root tsconfig now has `strict: true` + `strictNullChecks: true`, so
    # `tsc --noEmit` enforces strict typing repo-wide. The per-path
    # strict-null ratchet used during migration has been retired.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  unit-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  browser-e2e:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache Playwright's browser binaries between runs so we only pay
      # the ~112 MB chromium download once per package-lock change. Key
      # on the lockfile hash so a Playwright bump invalidates correctly;
      # restore-keys allows partial hits when other deps change. With a
      # cache hit, the install step below collapses to a fast apt-get
      # verification of system libraries (~30s) instead of a 2–4 min
      # download from playwright.azureedge.net.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build demo for E2E
        run: npm run build:demo
        env:
          VITE_BASE: /

      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke
        env:
          E2E_BASE_URL: http://localhost:4173
          E2E_WEB_SERVER_CMD: npm run preview -- --host localhost

      # Upload Playwright report + traces on failure so we can actually see
      # what broke without having to re-run locally. The report is emitted
      # by playwright.config.ts's html reporter into qa-output/html-report;
      # traces land in qa-output by default. Only runs if a previous step
      # failed, so green builds don't pay the upload cost.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: qa-output/
          retention-days: 14
