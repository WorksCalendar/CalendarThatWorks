name: Nightly AI QA

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  qa:
    runs-on: ubuntu-latest
    # Must exceed the cumulative bounded step runtime so if an early step
    # times out, the always-run reporting and artifact upload steps still fire.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        timeout-minutes: 10

      - run: npm run type-check
        timeout-minutes: 8

      - run: npm run test
        timeout-minutes: 12

      - run: npm run build:demo
        timeout-minutes: 8

      # Cache Playwright browsers between runs (same key shape as ci.yml).
      # On a hit, the install step collapses to fast apt-get verification.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Pin to chromium only — playwright.config.ts targets chromium, so
      # downloading firefox + webkit (the default with no browser arg) was
      # ~3x the bandwidth for zero test value. This was the dominant cost
      # of the original 10-minute timeout.
      - run: npx playwright install --with-deps chromium
        timeout-minutes: 10

      # Keep this to a focused smoke pass. The visual QA and confused-user
      # runs below collect the artifacts that feed the nightly issue.
      - name: Browser smoke tests
        run: npm run test:e2e:smoke
        timeout-minutes: 12

      - name: Confused user exploratory QA
        if: always()
        run: npx playwright test tests-e2e/confused-user.spec.ts
        timeout-minutes: 8
        continue-on-error: true

      - name: Visual screenshot capture and AI review
        if: always()
        run: npm run qa:visual
        timeout-minutes: 12
        continue-on-error: true
        env:
          OPENAI_BASE_URL: https://api.openai.com/v1
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LM_STUDIO_MODEL: gpt-4o-mini

      - name: Post or update nightly QA issue
        if: always()
        run: node scripts/post-nightly-qa-issue.mjs
        timeout-minutes: 3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-qa
          path: |
            qa-output/
            test-results/
            playwright-report/
          if-no-files-found: warn
